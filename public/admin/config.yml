# Decap CMS configuration for A Cut Above Barber Shop.
# Edit content via https://acutabovebarbersc.com/admin/

# DecapBridge PKCE auth (so editors can log in with Google / Microsoft /
# password and never need a GitHub account). Snippet from DecapBridge dashboard.
backend:
  name: git-gateway
  repo: Woollbert/ACutAboveBarberSC
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/80ef284f-4148-4bec-b706-8acce4211a0c/pkce
  auth_token_endpoint: /sites/80ef284f-4148-4bec-b706-8acce4211a0c/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# PKCE claims so DecapBridge can identify each editor in commit attribution.
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Where uploaded media (barber photos, shop interior) get saved in the repo.
media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://acutabovebarbersc.com
display_url: https://acutabovebarbersc.com
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Show a compact preview of recent commits / publishing state.
publish_mode: simple

collections:
  # ─────────────────────────────────────────────────────────────
  # SHOP INFO — phone, address, hours, online booking link
  # ─────────────────────────────────────────────────────────────
  - name: "site"
    label: "Shop Info"
    description: "Phone numbers, address, hours, online booking link, social media."
    files:
      - file: "src/data/site.json"
        label: "Shop Info"
        name: "site"
        editor: { preview: false }
        fields:
          - { label: "Business name",            name: "name",            widget: "string" }
          - { label: "Short name",               name: "shortName",       widget: "string" }
          - { label: "Tagline",                  name: "tagline",         widget: "string" }
          - { label: "Website URL",              name: "url",             widget: "string" }
          - { label: "Call number (display)",    name: "phone",           widget: "string", hint: "Format: 760-576-7856" }
          - { label: "Text-to-book number",      name: "smsNumber",       widget: "string", hint: "Used for the Text to Book buttons. Same as call number is fine." }
          - { label: "Email (optional)",         name: "email",           widget: "string", required: false }
          - { label: "Online booking URL",       name: "bookingUrl",      widget: "string", required: false, hint: "Paste your Fresha booking link here. Leave blank to hide all 'Book Online' buttons." }
          - { label: "Booking provider name",    name: "bookingProvider", widget: "string", default: "Fresha" }
          - label: "Address"
            name: "address"
            widget: "object"
            fields:
              - { label: "Street",       name: "street",  widget: "string" }
              - { label: "City",         name: "city",    widget: "string" }
              - { label: "State",        name: "region",  widget: "string" }
              - { label: "Zip",          name: "postal",  widget: "string" }
              - { label: "Country code", name: "country", widget: "string", default: "US" }
          - label: "Hours"
            name: "hours"
            widget: "list"
            summary: "{{fields.day}}: {{fields.time}}"
            fields:
              - { label: "Day(s)", name: "day",  widget: "string", hint: "e.g. 'Sunday' or 'Thu - Sat'" }
              - { label: "Hours",  name: "time", widget: "string", hint: "e.g. '8:00 AM - 9:00 PM' or 'Closed'" }
          - label: "Map coordinates"
            name: "geo"
            widget: "object"
            fields:
              - { label: "Latitude",  name: "lat", widget: "number", value_type: "float", step: 0.0001 }
              - { label: "Longitude", name: "lng", widget: "number", value_type: "float", step: 0.0001 }
          - label: "Shop social links (optional)"
            name: "social"
            widget: "object"
            fields:
              - { label: "Instagram URL",      name: "instagram", widget: "string", required: false }
              - { label: "TikTok URL",         name: "tiktok",    widget: "string", required: false }
              - { label: "Facebook URL",       name: "facebook",  widget: "string", required: false }
              - { label: "Google profile URL", name: "google",    widget: "string", required: false }

  # ─────────────────────────────────────────────────────────────
  # SERVICES & PRICING
  # ─────────────────────────────────────────────────────────────
  - name: "services"
    label: "Services & Pricing"
    description: "Service menu, prices, add-ons, and the 'included with every visit' list."
    files:
      - file: "src/data/services.json"
        label: "Services & Pricing"
        name: "services"
        editor: { preview: false }
        fields:
          - { label: "Pricing is placeholder?", name: "pricingIsPlaceholder", widget: "boolean", default: false, hint: "Leave OFF when prices are real. ON shows a 'starting points' disclaimer on the Services page." }
          - label: "Services"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — from {{fields.priceFrom}}"
            fields:
              - { label: "Name",            name: "name",        widget: "string" }
              - { label: "Starting price",  name: "priceFrom",   widget: "string", required: false, hint: "e.g. '$35'. Leave blank to hide the price badge." }
              - { label: "Price note",      name: "priceNote",   widget: "string", required: false, hint: "Optional small line under the price, e.g. 'varies by length'." }
              - { label: "Description",     name: "description", widget: "text" }
              - label: "Features"
                name: "features"
                widget: "list"
                required: false
                hint: "Small gold tags shown on the card."
                field: { label: "Feature", name: "feature", widget: "string" }
              - label: "Add-ons"
                name: "addOns"
                widget: "list"
                required: false
                hint: "Small bottom row, e.g. '+$5 straight razor shave'."
                field: { label: "Add-on", name: "addOn", widget: "string" }
          - label: "Included with every visit"
            name: "extras"
            widget: "list"
            field: { label: "Extra", name: "extra", widget: "string" }

  # ─────────────────────────────────────────────────────────────
  # MEET THE BARBERS
  # ─────────────────────────────────────────────────────────────
  - name: "barbers"
    label: "Meet the Barbers"
    description: "Owner, co-owner, and barber bios, taglines, specialties, and photos."
    files:
      - file: "src/data/barbers.json"
        label: "Meet the Barbers"
        name: "barbers"
        editor: { preview: false }
        fields:
          - label: "Barbers"
            name: "barbers"
            widget: "list"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: "URL slug",    name: "slug",     widget: "string", hint: "Lowercase, hyphens only. e.g. 'kristy-rogers'. Used in the URL: /barbers/<slug>/" }
              - { label: "Name",        name: "name",     widget: "string" }
              - { label: "Role",        name: "role",     widget: "select", options: ["Owner", "Co-Owner", "Barber"] }
              - { label: "Years",       name: "years",    widget: "string", hint: "e.g. '12+ years' or '2.5 years'." }
              - { label: "Tagline",     name: "tagline",  widget: "string" }
              - { label: "Bio",         name: "bio",      widget: "text" }
              - label: "Specialties"
                name: "specialties"
                widget: "list"
                field: { label: "Specialty", name: "specialty", widget: "string" }
              - { label: "Headshot photo", name: "photo", widget: "image", required: false, hint: "Upload a square photo (~600×600px). Leave blank to use the monogram placeholder." }
              - label: "Social links (optional)"
                name: "social"
                widget: "object"
                hint: "This barber's personal social accounts. Leave any field blank to hide that icon."
                fields:
                  - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
                  - { label: "TikTok URL",    name: "tiktok",    widget: "string", required: false }
                  - { label: "Facebook URL",  name: "facebook",  widget: "string", required: false }
              - label: "Portfolio (this barber's work samples)"
                name: "portfolio"
                widget: "list"
                required: false
                summary: "{{fields.caption}}"
                hint: "Upload photos of this barber's cuts. Each appears in their portfolio gallery on the /barbers/<slug>/ page."
                fields:
                  - { label: "Photo",   name: "image",   widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string", required: false, hint: "Short description, e.g. 'Skin fade with razor lineup'." }

  # ─────────────────────────────────────────────────────────────
  # PAGE COPY — every visible piece of marketing/body text on each page.
  # Use this to edit headlines, subtitles, intros, feature card copy, etc.
  # ─────────────────────────────────────────────────────────────
  - name: "page-copy"
    label: "Page Copy"
    description: "Edit headlines, subtitles, and body text on every page of the site."
    files:
      # ─── HOME PAGE ───
      - file: "src/data/copy/home.json"
        label: "Home page"
        name: "home"
        editor: { preview: false }
        fields:
          - { label: "Browser meta description", name: "metaDescription", widget: "text", hint: "Shown in Google search results and social link previews. Keep under 160 characters." }
          - label: "Hero (top of page)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow",       name: "eyebrow",       widget: "string", hint: "Small label above the headline, e.g. 'San Clemente • Est. by veterans'" }
              - { label: "Headline line 1", name: "headlineLine1", widget: "string" }
              - { label: "Headline line 2", name: "headlineLine2", widget: "string" }
              - { label: "Headline line 3 (gold)", name: "headlineLine3", widget: "string" }
              - { label: "Subtitle",       name: "subtitle",      widget: "text" }
              - label: "Stats (4 items)"
                name: "stats"
                widget: "list"
                summary: "{{fields.value}} {{fields.label}}"
                fields:
                  - { label: "Value (e.g. '30+')", name: "value", widget: "string" }
                  - { label: "Label (e.g. 'Years experience')", name: "label", widget: "string" }
              - { label: "Card eyebrow",   name: "cardEyebrow",   widget: "string", hint: "Small label on the dark card, e.g. 'The promise'" }
              - { label: "Card quote",     name: "cardQuote",     widget: "string", hint: "Italic quote on the dark card" }
          - label: "Why us section"
            name: "whyUs"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Heading",  name: "heading",  widget: "string" }
              - { label: "Intro paragraph", name: "intro", widget: "text" }
              - label: "Feature cards (4)"
                name: "cards"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Body",  name: "body",  widget: "text" }
          - label: "Services preview section"
            name: "servicesPreview"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
          - label: "Barbers preview section"
            name: "barbersPreview"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro",   name: "intro",   widget: "text" }
          - label: "Visit section"
            name: "visit"
            widget: "object"
            fields:
              - { label: "Eyebrow",      name: "eyebrow",     widget: "string" }
              - { label: "Heading",      name: "heading",     widget: "string" }
              - { label: "Intro",        name: "intro",       widget: "text" }
              - { label: "Extras note",  name: "extrasNote",  widget: "string", hint: "Small line under 'On-site' label, e.g. 'ATM available • Complimentary shampoo & drinks'" }

      # ─── ABOUT PAGE ───
      - file: "src/data/copy/about.json"
        label: "About page"
        name: "about"
        editor: { preview: false }
        fields:
          - { label: "Browser meta description", name: "metaDescription", widget: "text" }
          - label: "Page header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Title",    name: "title",    widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Owner card (sidebar)"
            name: "ownerCard"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Name",     name: "name",     widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - label: "Bullets"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "bullet", widget: "string" }
          - label: "Owner story (main column)"
            name: "ownerStory"
            widget: "object"
            fields:
              - { label: "Opening quote", name: "openingQuote", widget: "string", hint: "Big italic quote at the top, e.g. 'Hi, I'm Kristy Rogers...'" }
              - { label: "Paragraph 1",   name: "paragraph1",   widget: "text" }
              - { label: "Paragraph 2",   name: "paragraph2",   widget: "text" }
              - { label: "Paragraph 3",   name: "paragraph3",   widget: "text" }
          - label: "Co-owner section"
            name: "coOwner"
            widget: "object"
            fields:
              - { label: "Heading",     name: "heading",    widget: "string" }
              - { label: "Paragraph 1 (use **text** for bold)", name: "paragraph1", widget: "text" }
              - { label: "Paragraph 2", name: "paragraph2", widget: "text" }
          - label: "What makes us different"
            name: "whatMakesUsDifferent"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Cards (3)"
                name: "cards"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Body",  name: "body",  widget: "text" }
          - { label: "CTA heading", name: "ctaHeading", widget: "string" }
          - { label: "CTA subline", name: "ctaSubline", widget: "string" }

      # ─── SERVICES PAGE ───
      - file: "src/data/copy/services-page.json"
        label: "Services page"
        name: "services-page"
        editor: { preview: false }
        fields:
          - { label: "Browser meta description", name: "metaDescription", widget: "text" }
          - label: "Page header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Title",    name: "title",    widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Extras section ('Included with every visit')"
            name: "extrasSection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
          - label: "How it works"
            name: "howItWorks"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Steps (3)"
                name: "steps"
                widget: "list"
                summary: "{{fields.number}} {{fields.title}}"
                fields:
                  - { label: "Number", name: "number", widget: "string" }
                  - { label: "Title",  name: "title",  widget: "string" }
                  - { label: "Body",   name: "body",   widget: "text" }
          - { label: "CTA heading", name: "ctaHeading", widget: "string" }

      # ─── BARBERS PAGE ───
      - file: "src/data/copy/barbers-page.json"
        label: "Barbers page (list + detail)"
        name: "barbers-page"
        editor: { preview: false }
        fields:
          - { label: "Browser meta description", name: "metaDescription", widget: "text" }
          - label: "Page header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Title",    name: "title",    widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Drop by section (bottom)"
            name: "dropBy"
            widget: "object"
            fields:
              - { label: "Eyebrow",         name: "eyebrow",        widget: "string" }
              - { label: "Heading prefix",  name: "headingPrefix",  widget: "string", hint: "e.g. 'Call' (the phone number gets inserted between prefix and suffix)" }
              - { label: "Heading suffix",  name: "headingSuffix",  widget: "string", hint: "e.g. 'to book with your preferred barber.'" }
              - { label: "Subtitle",        name: "subtitle",       widget: "text" }
          - { label: "CTA heading", name: "ctaHeading", widget: "string" }
          - label: "Per-barber detail page (one bio page each)"
            name: "detail"
            widget: "object"
            hint: "Used on every individual barber's page, e.g. /barbers/kristy-rogers/. Use {firstName} as a placeholder."
            fields:
              - { label: "Back link text",          name: "backLink",            widget: "string" }
              - { label: "About label",             name: "aboutLabel",          widget: "string" }
              - { label: "Specialties label",       name: "specialtiesLabel",    widget: "string" }
              - { label: "Portfolio eyebrow",       name: "portfolioEyebrow",    widget: "string", hint: "{firstName} = barber's first name" }
              - { label: "Portfolio heading",       name: "portfolioHeading",    widget: "string" }
              - { label: "Empty portfolio message", name: "emptyPortfolioMessage", widget: "text" }
              - { label: "Empty portfolio button",  name: "emptyPortfolioCta",   widget: "string" }
              - { label: "CTA heading",             name: "ctaHeading",          widget: "string", hint: "{firstName} = barber's first name" }

      # ─── GALLERY PAGE ───
      - file: "src/data/copy/gallery-page.json"
        label: "Gallery page"
        name: "gallery-page"
        editor: { preview: false }
        fields:
          - { label: "Browser meta description", name: "metaDescription", widget: "text" }
          - label: "Page header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Title",    name: "title",    widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - { label: "Footer note (under photo grid)", name: "footerNote", widget: "text" }
          - { label: "CTA heading", name: "ctaHeading", widget: "string" }

      # ─── CONTACT PAGE ───
      - file: "src/data/copy/contact-page.json"
        label: "Visit & Book page"
        name: "contact-page"
        editor: { preview: false }
        fields:
          - { label: "Browser meta description", name: "metaDescription", widget: "text" }
          - label: "Page header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Title",    name: "title",    widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Call card"
            name: "callCard"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
          - label: "Text card"
            name: "textCard"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
          - label: "Book online card"
            name: "bookOnlineCard"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
          - label: "Drive over card"
            name: "driveOverCard"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
          - label: "Hours card"
            name: "hoursCard"
            widget: "object"
            fields:
              - { label: "Eyebrow",  name: "eyebrow",  widget: "string" }
              - { label: "Footnote", name: "footnote", widget: "text" }
          - label: "Good to know"
            name: "goodToKnow"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

      # ─── GLOBAL: footer, CTA defaults, 404 ───
      - file: "src/data/copy/global.json"
        label: "Global (footer, CTA defaults, 404)"
        name: "global"
        editor: { preview: false }
        fields:
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Brand line (under logo)", name: "brandLine", widget: "text" }
              - { label: "Bottom tagline",          name: "tagline",   widget: "string" }
              - { label: "Visit heading",           name: "visit",     widget: "string" }
              - { label: "Hours heading",           name: "hours",     widget: "string" }
              - { label: "Explore heading",         name: "explore",   widget: "string" }
              - { label: "Follow heading",          name: "follow",    widget: "string" }
          - label: "CTA band defaults"
            name: "ctaBand"
            widget: "object"
            hint: "These show on every page's bottom CTA section unless overridden by that page."
            fields:
              - { label: "Eyebrow",          name: "eyebrow",         widget: "string" }
              - { label: "Default heading",  name: "defaultHeading",  widget: "string" }
              - { label: "Default subline",  name: "defaultSubline",  widget: "text" }
          - label: "404 (page not found)"
            name: "notFound"
            widget: "object"
            fields:
              - { label: "Browser meta description", name: "metaDescription", widget: "text" }
              - { label: "Eyebrow",      name: "eyebrow",     widget: "string" }
              - { label: "Title",        name: "title",       widget: "string" }
              - { label: "Subtitle",     name: "subtitle",    widget: "text" }
              - { label: "Home button",  name: "homeButton",  widget: "string" }
